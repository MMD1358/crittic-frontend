<div class="page">
  <app-header></app-header>

  <main class="login-main">
    <section class="login-box">
      <h2 class="login-title">
        WELCOME TO<br>
        CRITTIC
      </h2>

      <form class="login-form" [formGroup]="loginForm" (ngSubmit)="login()">
        <input class="login-input" type="text" placeholder="Email / Username" formControlName="username">

        <p class="form-error" *ngIf="hasError('username')">
          Username is required.
        </p>

        <input class="login-input" type="password" placeholder="Password" formControlName="password">

        <p class="form-error" *ngIf="hasError('password')">
          Password is required.
        </p>

        <label class="remember">
          <span>Remember me:</span>
          <input type="checkbox" formControlName="rememberMe">
        </label>

        <button class="login-button" type="submit" [disabled]="loading">
          {{ loading ? 'WAIT' : 'LOG IN' }}
        </button>

        <p class="form-error api-error" *ngIf="errorMessage">
          {{ errorMessage }}
        </p>

        <div class="login-links">
          <a href="#">Forgot password</a>
          <a routerLink="/registro">Register</a>
        </div>
      </form>
    </section>
  </main>

  <app-footer></app-footer>
</div>
